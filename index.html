<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Sudoku Ultimate</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🧩 Sudoku Ultimate</h1>

<div class="top-bar">
  <button onclick="startGame('easy')">آسان</button>
  <button onclick="startGame('medium')">متوسط</button>
  <button onclick="startGame('hard')">سخت</button>
  <button onclick="toggleSettings()">⚙ تنظیمات</button>
</div>

<div class="info">
  ⭐ <span id="score">0</span>
  ❌ <span id="errors">0</span>
  ⏱ <span id="timer">0</span>
</div>

<div id="board"></div>

<!-- SETTINGS -->
<div id="settings" class="settings hidden">
  <h2>🎨 تنظیمات ظاهر</h2>

  <label>پس‌زمینه</label>
  <input type="color" id="bgColor">

  <label>باکس جدول</label>
  <input type="color" id="cellColor">

  <label>رنگ عددها</label>
  <input type="color" id="textColor">

  <button onclick="applySettings()">ذخیره</button>
  <button onclick="resetSettings()">ریست</button>
</div>

<script src="script.js"></script>
</body>
</html>
